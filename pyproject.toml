[build-system]
requires = ["setuptools>=51", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name="sequali"
version="0.5.0-dev"
description="Fast sequencing quality metrics"
keywords = [
    "FASTQ","sequencing","quality","uBAM","QC","nanopore", "illumina"
]
authors=[
    {name="Leiden University Medical Center", email="r.h.p.vorderman@lumc.nl"}
]

readme = "README.rst"
license = {file="LICENSE"}
classifiers = [
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: C",
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
    "Intended Audience :: Science/Research",
]

requires-python = ">=3.8"  # SupportsIndex requires 3.8
dependencies = [
    "xopen>=1.8.0",
    "pygal>=3.0.4",
    "tqdm"
]

[project.scripts]
sequali = "sequali.__main__:main"
sequali-report = "sequali.__main__:sequali_report"

[project.urls]
Homepage="https://github.com/rhpvorderman/sequali"

[tool.setuptools]
package-data = {"sequali" = [
    "*.pyi", "py.typed", 'contaminants/*', 'adapters/*', 'style/*']}
package-dir = {'' = "src"}

[tool.setuptools.packages.find]
where = ["src"]
